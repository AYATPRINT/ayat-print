name: Build & Package Artifacts

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      # 🔍 Détecter le sous-dossier du projet
      - name: 📂 Détecter le dossier projet
        id: detect
        run: |
          if [ -d "AYATPRINT-MVP" ]; then
            echo "PROJECT_DIR=AYATPRINT-MVP" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: 📦 Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔧 Installer pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 📚 Installer les dépendances dans le bon dossier
      - name: 📚 Installer les dépendances (monorepo)
        run: |
          cd ${{ env.PROJECT_DIR }}
          pnpm install --no-frozen-lockfile

      # 🔧 Supprimer "tsc" du script build du studio (évite les erreurs de typage)
      - name: 🔧 Corriger le script build du studio
        run: |
          cd ${{ env.PROJECT_DIR }}
          if [ -f "apps/studio/package.json" ]; then
            sed -i 's/"build": "tsc && vite build"/"build": "vite build"/' apps/studio/package.json
            echo "✅ Script build corrigé (tsc supprimé)"
          else
            echo "⚠️ apps/studio/package.json introuvable"
          fi

      # 🗄️ Générer le client Prisma (optionnel)
      - name: 🗄️ Générer le client Prisma
        run: |
          cd ${{ env.PROJECT_DIR }}
          pnpm db:generate 2>/dev/null || echo "⚠️ Prisma non configuré, on continue"

      # 🎨 Build du Frontend (Studio)
      - name: 🎨 Build du Frontend (Studio)
        run: |
          cd ${{ env.PROJECT_DIR }}
          pnpm --filter ./apps/studio build

      # ⚙️ Build du Backend (API) - optionnel
      - name: ⚙️ Build du Backend (API)
        run: |
          cd ${{ env.PROJECT_DIR }}
          pnpm --filter ./apps/api build 2>/dev/null || echo "⚠️ Build backend ignoré (dossier manquant ou erreur)"

      # 📤 Upload de l'artéfact Frontend
      - name: 📤 Upload de l'artéfact Frontend (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-studio-build
          path: ${{ env.PROJECT_DIR }}/apps/studio/dist
          if-no-files-found: warn

      # 📤 Upload de l'artéfact Backend
      - name: 📤 Upload de l'artéfact Backend (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-build
          path: ${{ env.PROJECT_DIR }}/apps/api/dist
          if-no-files-found: warn
