name: Extract ZIP into Repo

on:
  workflow_dispatch:  # Se lance manuellement depuis l'onglet Actions

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permet de pousser les modifications

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      - name: 📦 Extraire AYATPRINT.zip
        run: |
          if [ -f "AYATPRINT.zip" ]; then
            echo "✅ ZIP trouvé, extraction en cours..."
            unzip -o AYATPRINT.zip -d .
            rm -f AYATPRINT.zip
            echo "📁 Structure après extraction :"
            ls -la
            echo "📁 Contenu de apps/ :"
            ls -la apps/ || echo "⚠️ apps/ non trouvé"
          else
            echo "❌ AYATPRINT.zip introuvable !"
            exit 1
          fi

      - name: 📤 Commit et push des fichiers extraits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: extract project source from AYATPRINT.zip"
          git push
