services:
  - type: web
    name: ayatstudio-api
    env: node
    buildCommand: pnpm install && pnpm db:generate && pnpm --filter ./apps/api build
    startCommand: pnpm --filter ./apps/api start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ayatstudio-db
          property: connectionString
      - key: NODE_VERSION
        value: 20
