services:
  # Web Service for Express.js Core API
  - type: web
    name: ayatstudio-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: pnpm install && pnpm db:generate && pnpm --filter @ayatstudio/api build
    startCommand: pnpm --filter @ayatstudio/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ayatstudio-db
          property: connectionString

# PostgreSQL Database Service
databases:
  - name: ayatstudio-db
    region: frankfurt
    plan: free
    databaseName: ayat_studio_db
    user: postgres
