version: '3.8'

# Production overrides (e.g., restart policies, resource limits)
services:
  wordpress:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  wordpress_db:
    restart: always
    volumes:
      - wp_db_data:/var/lib/mysql

  ayat_studio:
    restart: always

  api:
    restart: always

volumes:
  wp_db_data:
